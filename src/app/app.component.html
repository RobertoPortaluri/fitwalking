<style>
  :host {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      Helvetica, Arial, sans-serif;
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .app-container {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  nav {
    background: linear-gradient(90deg, #F0070C 0%, #CC26D5 50%, #7702FF 100%);
    padding: 1rem 2rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  .nav-content {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 2rem;
  }

  .logo {
    font-size: 1.5rem;
    font-weight: bold;
    color: white;
    text-decoration: none;
  }

  .nav-links {
    display: flex;
    gap: 1rem;
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .nav-links a {
    color: white;
    text-decoration: none;
    padding: 0.5rem 1rem;
    border-radius: 0.5rem;
    transition: background 0.3s ease;
    font-weight: 500;
  }

  .nav-links a:hover,
  .nav-links a.active {
    background: rgba(255, 255, 255, 0.2);
  }

  main {
    flex: 1;
    padding: 2rem;
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
  }

  footer {
    background: #f5f5f5;
    padding: 1rem;
    text-align: center;
    color: #666;
  }
</style>

<div class="app-container">
  <nav>
    <div class="nav-content">
      <a routerLink="/" class="logo">🚶‍♂️ Fitwalking Ruffano</a>
      <ul class="nav-links">
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a></li>
        <li><a routerLink="/info" routerLinkActive="active">Info</a></li>
        <li><a routerLink="/foto" routerLinkActive="active">Foto</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <router-outlet />
  </main>

  <footer>
    <p>© 2026 Fitwalking Ruffano - Provincia di Lecce</p>
  </footer>
</div>
