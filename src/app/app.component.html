<style>
  :host {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      Helvetica, Arial, sans-serif;
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .app-container {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  nav {
    background: white;
    padding: 1rem 2rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }

  .nav-content {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 2rem;
  }

  .logo {
    font-size: 0.9rem;
    font-weight: bold;
    color: #333;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .logo img {
    height: 60px;
    width: auto;
  }

  .logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1.2;
  }

  .logo-main {
    font-size: 1rem;
    letter-spacing: 0.05em;
    color: #000;
  }

  .logo-subtitle {
    font-size: 0.65rem;
    font-weight: 400;
    color: #666;
  }

  .nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
    margin: 0;
    padding: 0;
    flex: 1;
    justify-content: center;
  }

  .nav-links a {
    color: #333;
    text-decoration: none;
    padding: 0.5rem 0;
    transition: color 0.3s ease;
    font-weight: 500;
    font-size: 0.95rem;
  }

  .nav-links a:hover,
  .nav-links a.active {
    color: #E91E63;
  }

  .nav-actions {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .join-btn {
    padding: 0.6rem 1.5rem;
    background: white;
    color: #333;
    text-decoration: none;
    border: 3px solid #e0e0e0;
    border-radius: 30px;
    font-weight: 600;
    font-size: 0.9rem;
    transition: all 0.3s ease;
    white-space: nowrap;
    position: relative;
  }

  .join-btn:hover {
    border: 3px solid transparent;
    background: 
      linear-gradient(white, white) padding-box,
      linear-gradient(90deg, #E91E63, #FFC107, #00BCD4, #2196F3) border-box;
  }

  main {
    flex: 1;
    padding: 2rem;
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
  }

  footer {
    background: #f5f5f5;
    padding: 1rem;
    text-align: center;
    color: #666;
  }
</style>

<div class="app-container">
  <nav>
    <div class="nav-content">
      <a routerLink="/" class="logo">
        <img src="/assets/logo.png" alt="Fitwalking Group Ruffano Logo">
        <div class="logo-text">
          <span class="logo-main">FITWALKINGGROUP</span>
          <span class="logo-subtitle">Camminare BENE per stare BENE</span>
        </div>
      </a>
      <ul class="nav-links">
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a></li>
        <li><a routerLink="/info" routerLinkActive="active">Chi Siamo</a></li>
        <li><a routerLink="/foto" routerLinkActive="active">Foto</a></li>
      </ul>
      <div class="nav-actions">
        <a routerLink="/info" class="join-btn">Unisciti a Noi ➜</a>
      </div>
    </div>
  </nav>

  <main>
    <router-outlet />
  </main>

  <footer>
    <p>© 2026 Fitwalking Ruffano - Provincia di Lecce</p>
  </footer>
</div>
