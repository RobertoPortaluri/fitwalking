<div class="home-container">
  <div class="header">
    <img src="/assets/logo.png" alt="Logo Fitwalking" class="logo">
    <h1>Fitwalking Ruffano</h1>
  </div>
  <p class="subtitle">Benvenuti nel gruppo di camminata di Ruffano!</p>
  
  <div class="cards-grid">
    <mat-card class="nav-card" *ngFor="let card of cards" [routerLink]="card.route">
      <mat-card-content>
        <h2>{{ card.title }}</h2>
        <p>{{ card.description }}</p>
      </mat-card-content>
    </mat-card>
  </div>
</div>
