<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Fitwalking Group Ruffano</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    .app-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f5f5f5;
    }
    
    .app-loading .logo-container {
      position: relative;
      margin-bottom: 2rem;
    }
    
    .app-loading .logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
      animation: pulse 2s ease-in-out infinite;
    }
    
    .app-loading .spinner {
      width: 150px;
      height: 150px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    
    .app-loading .spinner-circle {
      fill: none;
      stroke: url(#gradient);
      stroke-width: 4;
      stroke-linecap: round;
      animation: rotate 2s linear infinite;
      transform-origin: center;
    }
    
    .app-loading .loading-text {
      color: #333;
      font-family: 'Roboto', sans-serif;
      font-size: 1.2rem;
      font-weight: 500;
    }
    
    @keyframes rotate {
      from {
        stroke-dasharray: 0 314;
        transform: rotate(0deg);
      }
      50% {
        stroke-dasharray: 157 157;
        transform: rotate(180deg);
      }
      to {
        stroke-dasharray: 0 314;
        transform: rotate(360deg);
      }
    }
    
    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
    }
  </style>
</head>
<body class="mat-typography">
  <app-root>
    <div class="app-loading">
      <div class="logo-container">
        <img src="assets/logo.png" alt="Loading..." class="logo">
        <svg class="spinner" viewBox="0 0 50 50">
          <defs>
            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
              <stop offset="25%" style="stop-color:#EC008C;stop-opacity:1" />
              <stop offset="50%" style="stop-color:#FFC107;stop-opacity:1" />
              <stop offset="75%" style="stop-color:#2196F3;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#4CAF50;stop-opacity:1" />
            </linearGradient>
          </defs>
          <circle class="spinner-circle" cx="25" cy="25" r="20"></circle>
        </svg>
      </div>
      <p class="loading-text">Caricamento...</p>
    </div>
  </app-root>
</body>
</html>
